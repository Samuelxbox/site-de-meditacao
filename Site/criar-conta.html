<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles1.css">
    <title>Cadastro</title>
</head>
<body>
    <div class="celular">
            <div class="tela">
              <form action="home.html">
                <div>
                  <label>Nome:</label><br>
                  <input type="text" required placeholder="Entre seu nome">
                </div>
                <br>
                <div>
                  <label>Email:</label><br>
                  <input type="email" required placeholder="Entre seu email">
                </div>
                <br>
                <div>
                  <label>Senha:</label><br>
                  <input type="password" required placeholder="Entre sua senha">
                </div>
                <br>
                  <button type="submit">CADASTRAR</button>
              </form>
            </div>
    </div>
</body>
</html>
