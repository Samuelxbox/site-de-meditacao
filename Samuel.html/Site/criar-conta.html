<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles1.css">
    <title>Cadastro</title>
</head>
<body>
    <div class="celular">
            <div class="tela">
              <form action="home.html">
                <div>
                  <label>Primeiro Nome:</label>
                  <input type="text" required placeholder="Entre seu primeiro nome">
                </div>
                <br>
                <div>
                  <label>Segundo Nome:</label>
                  <input type="text" required placeholder="Entre seu segundo nome">
                </div>
                <br>    
                <div>
                  <label>Gênero:</label>
                 <select required>
                  <option value="escolha">Escolha</option>
                  <option value="masculino">Masculino</option>
                  <option value="feminino">Feminino</option>
                  <option value="geladeira-eletrolux">Geladeira Eletrolux</option>
                  <option value="helicoptero-de-guerra">Helicóptero de Guerra</option>
                  <option value="numero-binario">Número Binário</option>
                 </select>
                </div>
                <br>      
                <div>
                  <label>Data de nascimento:</label>
                  <input type="date" required>
                </div>
                <br>
                <div>
                  <label>Email:</label>
                  <input type="email" required placeholder="Entre seu email">
                </div>
                <br>
                <div>
                  <label>Senha:</label>
                  <input type="password" required placeholder="Entre sua senha">
                </div>
                <br>
                <div>
                  <label>Confirme a senha:</label>
                  <input type="password" required placeholder="Entre sua senha novamente">
                </div>
                <br>
                  <button type="submit">CADASTRAR</button>
              </form>
            </div>
    </div>
</body>
</html>
